version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - goconst
    - prealloc
    - nolintlint
  settings:
    govet:
      enable:
        - shadow
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
  exclusions:
    presets: []

run:
  timeout: 5m

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
