syntax = "proto3";

package user;

option go_package = "github.com/effect707/MessngerGrusha/api/gen/user";

import "google/api/annotations.proto";

service UserService {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse) {
    option (google.api.http) = {
      get: "/api/users/{user_id}"
    };
  }
  rpc GetOnlineStatus(GetOnlineStatusRequest) returns (GetOnlineStatusResponse) {
    option (google.api.http) = {
      post: "/api/users/online-status"
      body: "*"
    };
  }
  rpc GetNotifications(GetNotificationsRequest) returns (GetNotificationsResponse) {
    option (google.api.http) = {
      get: "/api/notifications"
    };
  }
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (MarkNotificationReadResponse) {
    option (google.api.http) = {
      post: "/api/notifications/{notification_id}/read"
    };
  }
  rpc MarkAllNotificationsRead(MarkAllNotificationsReadRequest) returns (MarkAllNotificationsReadResponse) {
    option (google.api.http) = {
      post: "/api/notifications/read-all"
    };
  }
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse) {
    option (google.api.http) = {
      get: "/api/notifications/unread-count"
    };
  }
}

message GetProfileRequest {
  string user_id = 1;
}

message GetProfileResponse {
  User user = 1;
}

message GetOnlineStatusRequest {
  repeated string user_ids = 1;
}

message GetOnlineStatusResponse {
  map<string, bool> statuses = 1;
}

message GetNotificationsRequest {
  int32 limit = 1;
  bool unread_only = 2;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
}

message MarkNotificationReadRequest {
  string notification_id = 1;
}

message MarkNotificationReadResponse {}

message MarkAllNotificationsReadRequest {}

message MarkAllNotificationsReadResponse {}

message GetUnreadCountRequest {}

message GetUnreadCountResponse {
  int64 count = 1;
}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string display_name = 4;
  string avatar_url = 5;
  string bio = 6;
  string created_at = 7;
}

message Notification {
  string id = 1;
  string type = 2;
  string payload = 3;
  bool is_read = 4;
  string created_at = 5;
}
